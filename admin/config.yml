backend:
  name: github
  repo: h-s017/tjcshipai
  branch: main

local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://h-s017.github.io/tjcshipai/"
display_url: "https://h-s017.github.io/tjcshipai/"
logo_url: "https://h-s017.github.io/tjcshipai/"

collections:
  - name: "site_data"
    label: "網站資料"
    files:
      - label: "最新消息"
        name: "news"
        file: "data/news.json"
        format: "json"
        fields:
          - label: "更新日期"
            name: "updatedAt"
            widget: "string"
          - label: "消息列表"
            name: "items"
            widget: "list"
            fields:
              - { label: "日期／標籤", name: "date", widget: "string" }
              - { label: "標題", name: "title", widget: "string" }
              - { label: "摘要", name: "excerpt", widget: "text" }
              - { label: "連結", name: "url", widget: "string" }

      - label: "真理造就班｜十大信條"
        name: "truth"
        file: "data/truth.json"
        format: "json"
        fields:
          - { label: "來源標題", name: "sourceTitle", widget: "string" }
          - { label: "來源網址", name: "sourceUrl", widget: "string" }
          - { label: "更新日期", name: "updatedAt", widget: "string" }
          - { label: "頁面導言", name: "intro", widget: "text" }
          - label: "信條文章"
            name: "items"
            widget: "list"
            fields:
              - { label: "編號", name: "number", widget: "string" }
              - { label: "標題", name: "title", widget: "string" }
              - { label: "副標", name: "subtitle", widget: "string" }
              - { label: "週次／日期", name: "date", widget: "string" }
              - { label: "摘要", name: "excerpt", widget: "text" }
              - { label: "內文", name: "content", widget: "text" }
              - { label: "來源連結", name: "sourceUrl", widget: "string" }

      - label: "石牌40｜家族見證"
        name: "testimonies"
        file: "data/testimonies.json"
        format: "json"
        fields:
          - { label: "頁面標題", name: "pageTitle", widget: "string" }
          - { label: "Facebook 社團", name: "sourceUrl", widget: "string" }
          - { label: "Facebook 粉專", name: "facebookPageUrl", widget: "string" }
          - { label: "更新日期", name: "updatedAt", widget: "string" }
          - { label: "頁面導言", name: "intro", widget: "text" }
          - label: "見證文章"
            name: "items"
            widget: "list"
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "標題", name: "title", widget: "string" }
              - { label: "家庭／作者", name: "family", widget: "string" }
              - { label: "摘要", name: "excerpt", widget: "text" }
              - { label: "內文", name: "content", widget: "text" }
              - { label: "狀態", name: "status", widget: "string" }
